spring:
  application:
    name: proyectoNCapas

  # --- Configuración de Base de Datos ---
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# --- Configuración de Stripe ---
stripe:
  secret:
    key: ${STRIPE_SECRET_KEY}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET:whsec_temporal_por_definir}

# --- Configuración de AWS S3 ---
aws:
  s3:
    bucket-name: proyecto-ncapas-dev
    region: us-east-1
    endpoint-override: http://localhost:9000
  credentials:
    access-key-id: minioadmin
    secret-access-key: minioadmin

# --- Configuración de JWT ---
security:
  jwt:
    secret-key: ${JWT_SECRET}
    expiration-time: ${JWT_EXPIRATION}