spring:
  application:
    name: proyectoNCapas

  # --- Configuración de Base de Datos ---
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# --- Configuración de Stripe ---
stripe:
  secret:
    key: ${STRIPE_SECRET_KEY}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET:whsec_temporal_por_definir}

frontend:
  url: ${FRONTEND_URL:https://proyecto-n-capas-frontend.vercel.app}

payment:
  reservation-expiration-minutes: 30

# --- Configuración de almacenamiento S3-compatible (AWS S3 / OCI Object Storage / MinIO local) ---
aws:
  s3:
    bucket-name: ${BUCKET_NAME:proyecto-ncapas-dev}
    region: ${AWS_REGION:${OCI_REGION:us-east-1}}
    # Vacío en prod (AWS/OCI real). Solo definir en local: S3_ENDPOINT=http://localhost:9000
    endpoint-override: ${S3_ENDPOINT:}
  credentials:
    access-key-id: ${OCI_S3_ACCESS_KEY:${AWS_ACCESS_KEY_ID:minioadmin}}
    secret-access-key: ${OCI_S3_SECRET_KEY:${AWS_SECRET_ACCESS_KEY:minioadmin}}

# --- Configuración de JWT ---
security:
  jwt:
    # HS256 requiere >= 256 bits (32 caracteres). Override en prod con JWT_SECRET.
    secret-key: ${JWT_SECRET:rentpro-local-dev-jwt-secret-key-2026!!}
    expiration-time: ${JWT_EXPIRATION:86400000}
