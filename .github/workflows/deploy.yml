name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - develop

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPO_NAME: ncapas-repo
  SERVICE_NAME: springboot-api

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el código del repositorio de GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Java JDK 21 (Actualizado)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. Dar permisos de ejecución a gradlew y compilar el proyecto
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      # 4. Autenticarse de forma segura en Google Cloud Platform
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 5. Inicializar las herramientas del SDK de Google Cloud (gcloud)
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 6. Configurar y autorizar Docker para escribir en tu Artifact Registry
      - name: Configure Docker for GCP
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # 7. Construir y etiquetar la imagen Docker bajo la arquitectura estándar x86_64
      - name: Build and Tag Docker Image
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker tag us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest

      # 8. Subir las imágenes de Docker al repositorio gratuito de Google Cloud
      - name: Push Docker Image to Artifact Registry
        run: |
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest

      # 9. Desplegar la imagen de forma Serverless en Cloud Run
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --min-instances=0
            --max-instances=2
            --cpu-throttling
            --memory=512Mi
            --cpu=1
          # Inyección exacta de variables de entorno requeridas por tu application.yml
          env_vars: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            BUCKET_NAME=${{ secrets.BUCKET_NAME }}
            OCI_REGION=${{ secrets.OCI_REGION }}
            S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}
            OCI_S3_ACCESS_KEY=${{ secrets.OCI_S3_ACCESS_KEY }}
            OCI_S3_SECRET_KEY=${{ secrets.OCI_S3_SECRET_KEY }}
            JAVA_OPTS=-Xmx400m -Xms256m -XX:+UseSerialGC